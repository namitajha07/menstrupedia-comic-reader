<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF6B6B">
    <meta name="description" content="Mobile-friendly comic reader for Menstrupedia - Making period education accessible to every child">
    <title>Menstrupedia Comic Reader 📚</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="flower-loader">🌸</div>
            <h2>Loading your comic...</h2>
            <div class="loading-bar"><div class="loading-progress"></div></div>
        </div>
    </div>

    <!-- App Header -->
    <header class="app-header" id="app-header">
        <div class="header-left">
            <button class="icon-btn menu-btn" id="menu-btn" aria-label="Open menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="logo">
                <span class="logo-icon">🌸</span>
                <span class="logo-text">Menstrupedia</span>
            </div>
        </div>
        <div class="header-right">
            <button class="icon-btn bookmark-btn" id="bookmark-btn" aria-label="Bookmark this page">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                </svg>
            </button>
            <button class="icon-btn read-aloud-btn" id="read-aloud-btn" aria-label="Read aloud">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                </svg>
            </button>
            <button class="icon-btn settings-btn" id="settings-btn" aria-label="Settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Side Menu -->
    <nav class="side-menu" id="side-menu" aria-hidden="true">
        <div class="menu-overlay" id="menu-overlay"></div>
        <div class="menu-panel">
            <div class="menu-header">
                <span class="menu-logo">🌸 Menstrupedia Reader</span>
                <button class="close-menu" id="close-menu" aria-label="Close menu">✕</button>
            </div>
            <div class="menu-content">
                <div class="menu-section">
                    <h3>📖 Comic Chapters</h3>
                    <ul class="chapter-list" id="chapter-list">
                        <!-- Populated by JS -->
                    </ul>
                </div>
                <div class="menu-section">
                    <h3>🔖 Bookmarks</h3>
                    <ul class="bookmark-list" id="bookmark-list">
                        <li class="empty-bookmarks">No bookmarks yet. Tap the bookmark icon while reading!</li>
                    </ul>
                </div>
                <div class="menu-section">
                    <h3>🌍 Language</h3>
                    <div class="language-selector">
                        <button class="lang-btn active" data-lang="en">English</button>
                        <button class="lang-btn" data-lang="hi">हिंदी</button>
                        <button class="lang-btn" data-lang="mr">मराठी</button>
                        <button class="lang-btn" data-lang="gu">ગુજરાતી</button>
                    </div>
                </div>
                <div class="menu-section offline-status">
                    <span id="offline-badge" class="offline-badge hidden">📴 Offline Mode</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settings-panel" aria-hidden="true">
        <div class="settings-overlay" id="settings-overlay"></div>
        <div class="settings-content">
            <div class="settings-header">
                <h2>⚙️ Reading Settings</h2>
                <button class="close-settings" id="close-settings">✕</button>
            </div>
            <div class="settings-body">
                <div class="setting-item">
                    <label>Reading Direction</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-direction="ltr">Left to Right</button>
                        <button class="toggle-btn" data-direction="rtl">Right to Left</button>
                    </div>
                </div>
                <div class="setting-item">
                    <label>Page Fit</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-fit="contain">Fit to Screen</button>
                        <button class="toggle-btn" data-fit="width">Fit Width</button>
                    </div>
                </div>
                <div class="setting-item">
                    <label>Auto-hide Controls</label>
                    <label class="switch">
                        <input type="checkbox" id="auto-hide-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label>High Contrast Mode</label>
                    <label class="switch">
                        <input type="checkbox" id="contrast-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Reader Area -->
    <main class="reader-container" id="reader-container">
        <!-- Comic Page -->
        <div class="page-wrapper" id="page-wrapper">
            <img 
                class="comic-page" 
                id="comic-page" 
                src="" 
                alt="Comic page content" 
                loading="lazy"
                draggable="false"
            >
            <!-- Page transition overlay -->
            <div class="page-transition" id="page-transition"></div>
        </div>

        <!-- Navigation Zones (invisible tap areas) -->
        <div class="nav-zone nav-prev" id="nav-prev" aria-label="Previous page"></div>
        <div class="nav-zone nav-next" id="nav-next" aria-label="Next page"></div>

        <!-- Navigation Buttons (visible) -->
        <button class="nav-arrow nav-arrow-prev" id="nav-arrow-prev" aria-label="Previous page">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
        <button class="nav-arrow nav-arrow-next" id="nav-arrow-next" aria-label="Next page">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>

        <!-- Progress Bar -->
        <div class="progress-container" id="progress-container">
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="page-indicator" id="page-indicator">1 / 10</span>
        </div>

        <!-- Read Aloud Bar -->
        <div class="read-aloud-bar" id="read-aloud-bar" aria-hidden="true">
            <div class="read-aloud-content">
                <span class="speaking-icon">🔊</span>
                <span class="speaking-text" id="speaking-text">Reading aloud...</span>
                <button class="stop-speech" id="stop-speech">⏹ Stop</button>
            </div>
        </div>
    </main>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Install Prompt (PWA) -->
    <div class="install-prompt" id="install-prompt" aria-hidden="true">
        <div class="install-content">
            <span>📲 Install Menstrupedia Reader for offline reading!</span>
            <button class="install-btn" id="install-btn">Install</button>
            <button class="dismiss-install" id="dismiss-install">✕</button>
        </div>
    </div>

    <script src="js/comic-data.js"></script>
    <script src="js/reader.js"></script>
    <script src="js/sw-register.js"></script>
</body>
</html>
